name: Publish Pyics to PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  release:
    types: [created, published]

env:
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CLEAN: "1"

jobs:
  # ============================================================================
  # BUILD JOB - Build distribution packages
  # ============================================================================
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine check-wheel-contents

      - name: Build package
        run: python -m build

      - name: Check wheel contents
        run: check-wheel-contents dist/*.whl

      - name: Check package with twine
        run: twine check dist/*

      - name: Get version
        id: get-version
        run: |
          VERSION=$(python -c "import pyics; print(pyics.__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Built version: $VERSION"

      - name: Upload distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 5

  # ============================================================================
  # TEST JOB - Run test suite before publishing
  # ============================================================================
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install dist/*.whl
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --cov=pyics --cov-report=xml || echo "No tests found"

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ============================================================================
  # PUBLISH TO TESTPYPI - On every push to main
  # ============================================================================
  publish-to-testpypi:
    name: Publish to TestPyPI 🧪
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pyics
    
    permissions:
      id-token: write  # Required for Trusted Publishing (OIDC)
    
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ============================================================================
  # PUBLISH TO PYPI - On tag push or release
  # ============================================================================
  publish-to-pypi:
    name: Publish to PyPI 🚀
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    
    environment:
      name: pypi
      url: https://pypi.org/project/pyics
    
    permissions:
      id-token: write  # Required for Trusted Publishing (OIDC)
    
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ============================================================================
  # CREATE GITHUB RELEASE - On tag push
  # ============================================================================
  github-release:
    name: Create GitHub Release 📝
    needs: [build, publish-to-pypi]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create
          '${{ github.ref_name }}'
          --repo '${{ github.repository }}'
          --notes-from-tag
          --title "Pyics ${{ github.ref_name }}"
          dist/**